    theirs_snapshot:
      .github/workflows/ci.yml: |
        name: ci

        on:
          push:
            branches:
              - main
          pull_request:

        concurrency:
          group: ${{ github.workflow }}-${{ github.ref }}
          cancel-in-progress: false

        jobs:
          compile:
            runs-on: ubuntu-latest
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Compile
                run: pnpm build

          test:
            runs-on: ubuntu-latest
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Test
                run: pnpm test

          publish:
            needs: [compile, test]
            if: github.event_name == 'push' && github.ref == 'refs/heads/main'
            runs-on: ubuntu-latest
            permissions:
              contents: write  # Required for creating GitHub Releases
              id-token: write  # Required for OIDC npm provenance
            steps:
              - name: Checkout repo
                uses: actions/checkout@v4

              - name: Set up node
                uses: actions/setup-node@v4
                with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'

              - name: Install pnpm
                uses: pnpm/action-setup@v4

              - name: Install dependencies
                run: pnpm install --frozen-lockfile

              - name: Build
                run: pnpm build

              - name: Tag release
                id: tag
                run: |
                  VERSION=$(node -p "require('./package.json').version")
                  TAG="v${VERSION}"
                  git tag "${TAG}" || echo "Tag ${TAG} already exists, skipping"
                  git push origin "${TAG}" || echo "Tag already pushed, skipping"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

              - name: Create GitHub Release
                uses: softprops/action-gh-release@v2
                with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  generate_release_notes: true

              - name: Publish to npm
                env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                run: npm publish --provenance --registry https://registry.npmjs.org
    user_owned: true
